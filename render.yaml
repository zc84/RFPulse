services:
  - type: web
    name: rfpulse
    runtime: node
    plan: starter
    buildCommand: npm run render:build
    preDeployCommand: npm run render:predeploy
    startCommand: npm run render:start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: rfpulse-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: UPLOAD_DIR
        value: /var/data/uploads
    disk:
      name: rfpulse-uploads
      mountPath: /var/data
      sizeGB: 5

databases:
  - name: rfpulse-db
    plan: free
    databaseName: rfpulse
    user: rfpulse
